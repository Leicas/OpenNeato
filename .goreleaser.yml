version: 2

project_name: openneato

env:
  - PIO_BUILD_DIR={{ if index .Env "PIO_BUILD_DIR" }}{{ .Env.PIO_BUILD_DIR }}{{ else }}.pio/build/c3-release{{ end }}

before:
  hooks:
    - bash scripts/prepare_flash_embed.sh {{ .Env.PIO_BUILD_DIR }}

builds:
  - id: openneato-flash
    dir: flash
    binary: openneato-flash
    env:
      - >-
        {{- if eq .Os "darwin" }}CGO_ENABLED=1{{- else }}CGO_ENABLED=0{{- end }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: flash-tool
    ids:
      - openneato-flash
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "openneato-flash-{{ .Os }}-{{ .Arch }}"

release:
  github:
    owner: renjfk
    name: OpenNeato

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
