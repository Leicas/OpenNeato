; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = firmware/src
lib_dir = firmware/lib

[env]
platform = espressif32 @ 7.0.1
framework = arduino
extra_scripts = pre:scripts/env_config.py
board_build.partitions = firmware/partition.csv
board_build.filesystem = spiffs
upload_speed = 115200
monitor_speed = 115200
check_tool = clangtidy
check_flags = 
	clangtidy: --config-file=.clang-tidy
check_skip_packages = yes
lib_compat_mode = strict
lib_ldf_mode = chain
lib_deps = 
	ESP32Async/AsyncTCP @ 3.4.10
	ESP32Async/ESPAsyncWebServer @ 3.11.0

[mode_ota]
upload_protocol = custom
upload_command = bash -c 'HASH=$$(md5sum "$SOURCE" | cut -d" " -f1) && curl -f --progress-bar -F "file=@$SOURCE" "http://$UPLOAD_PORT/api/firmware/update?hash=$$HASH"'

[board_c3]
board = esp32-c3-devkitm-1
build_flags = 
	-Wno-attributes
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DCHIP_MODEL=\"ESP32-C3\"
	-std=gnu++17

[env:c3-debug]
extends = board_c3
platform_packages = 
	pioarduino/tool-esptoolpy@^5.0.2
	platformio/tool-esptoolpy@^2.41100.0

[env:c3-ota]
extends = board_c3, mode_ota
build_flags = 
	${board_c3.build_flags}
	-DENABLE_LOGGING=0
platform_packages = 
	pioarduino/tool-esptoolpy@^5.0.2
	platformio/tool-esptoolpy@^2.41100.0

[env:c3-release]
extends = board_c3
build_flags = 
	${board_c3.build_flags}
	-DENABLE_LOGGING=0
platform_packages = 
	pioarduino/tool-esptoolpy@^5.0.2
	platformio/tool-esptoolpy@^2.41100.0

[board_c6]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21-2/platform-espressif32.zip
board = esp32-c6-devkitc-1
build_flags = 
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DCHIP_MODEL=\"ESP32-C6\"
	-std=gnu++17

[env:c6-debug]
extends = board_c6
platform_packages = 
	pioarduino/tool-esptoolpy@^5.0.2
	platformio/tool-esptoolpy@^2.41100.0

[env:c6-ota]
extends = board_c6, mode_ota
build_flags =
	${board_c6.build_flags}
	-DENABLE_LOGGING=0
	-DCORE_DEBUG_LEVEL=0

[env:c6-release]
extends = board_c6
build_flags =
	${board_c6.build_flags}
	-DENABLE_LOGGING=0
	-DCORE_DEBUG_LEVEL=0

[board_s3]
board = esp32-s3-devkitc-1
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
build_flags = 
	-Wno-attributes
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DCHIP_MODEL=\"ESP32-S3\"
	-std=gnu++17

[env:s3-debug]
extends = board_s3
platform_packages = 
	pioarduino/tool-esptoolpy@^5.0.2
	platformio/tool-esptoolpy@^2.41100.0

[env:s3-ota]
extends = board_s3, mode_ota
build_flags = 
	${board_s3.build_flags}
	-DENABLE_LOGGING=0
platform_packages = 
	pioarduino/tool-esptoolpy@^5.0.2
	platformio/tool-esptoolpy@^2.41100.0

[env:s3-release]
extends = board_s3
build_flags = 
	${board_s3.build_flags}
	-DENABLE_LOGGING=0
platform_packages = 
	pioarduino/tool-esptoolpy@^5.0.2
	platformio/tool-esptoolpy@^2.41100.0

[board_esp32]
board = esp32dev
build_flags = 
	-Wno-attributes
	-DCHIP_MODEL=\"ESP32\"
	-std=gnu++17

[env:esp32-debug]
extends = board_esp32
platform_packages = 
	pioarduino/tool-esptoolpy@^5.0.2
	platformio/tool-esptoolpy@^2.41100.0

[env:esp32-ota]
extends = board_esp32, mode_ota
build_flags = 
	${board_esp32.build_flags}
	-DENABLE_LOGGING=0
platform_packages = 
	pioarduino/tool-esptoolpy@^5.0.2
	platformio/tool-esptoolpy@^2.41100.0

[env:esp32-release]
extends = board_esp32
build_flags = 
	${board_esp32.build_flags}
	-DENABLE_LOGGING=0
platform_packages = 
	pioarduino/tool-esptoolpy@^5.0.2
	platformio/tool-esptoolpy@^2.41100.0
